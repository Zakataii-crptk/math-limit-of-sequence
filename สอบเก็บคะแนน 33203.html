<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Limit Sequence Exam Generator</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#eef2f7;
    margin:0;
    padding:20px;
}

.card{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.1);
}

h1{
    text-align:center;
}

.question{
    font-size:30px;
    text-align:center;
    margin:40px 0;
    min-height:140px;
    transition:0.2s;
}

button{
    padding:12px 22px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#1565c0;
    color:white;
    cursor:pointer;
    margin:5px;
}

button:hover{
    background:#0d47a1;
}

.info{
    text-align:center;
    margin-top:15px;
    font-size:18px;
}

.badge{
    display:inline-block;
    background:#333;
    color:white;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
}

</style>
</head>

<body>

<div class="card">

<h1>📘 Limit Sequence Exam Generator</h1>

<div class="info">
<span class="badge">Hard Level</span>
</div>

<div id="question" class="question"></div>

<div style="text-align:center">
<button onclick="next()">Next</button>
<button onclick="resetAll()">Reset</button>
</div>

<div class="info">
No: <span id="count">0</span>
</div>

</div>

<script>

let count = 0;
let used = new Set();

function rand(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

const gens = [

() => `\\[ a_n = \\frac{(${rand(1,9)}n+${rand(1,9)})(${rand(1,9)}n-${rand(1,9)})}{${rand(1,9)}n^2+${rand(1,9)}n-${rand(1,9)}} \\]`,

() => `\\[ a_n = \\frac{${rand(1,9)}n^3-${rand(1,9)}n+${rand(1,9)}}{${rand(1,9)}n^3+${rand(1,9)}n^2-${rand(1,9)}} \\]`,

() => `\\[ a_n = \\frac{(n+${rand(1,5)})(n-${rand(1,5)})}{n^2+${rand(1,9)}} \\]`,

() => `\\[ a_n = \\frac{n^2+${rand(1,9)}n+${rand(1,9)}}{n^2-${rand(1,9)}n+${rand(1,9)}} \\]`,

() => `\\[ a_n = \\frac{\\sqrt{n^2+${rand(1,9)}n+${rand(1,9)}}}{n+${rand(1,9)}} \\]`,

() => `\\[ a_n = \\frac{\\sqrt{${rand(1,9)}n^2+${rand(1,9)}n}-${rand(1,5)}n}{n} \\]`,

() => `\\[ a_n = \\frac{n}{\\sqrt{n^2+${rand(1,9)}n}-${rand(1,5)}n} \\]`,

() => `\\[ a_n = \\frac{\\sqrt{n^2+${rand(1,9)}}+\\sqrt{n^2-${rand(1,9)}}}{n} \\]`,

() => `\\[ a_n = \\frac{${rand(2,5)}^n+ n^2}{${rand(6,9)}^n} \\]`,

() => `\\[ a_n = \\frac{n^{${rand(3,6)}}}{${rand(2,5)}^n} \\]`,

() => `\\[ a_n = \\frac{${rand(2,5)}^n}{n^{${rand(2,5)}}} \\]`,

() => `\\[ a_n = \\left(1+\\frac{${rand(1,5)}}{n}\\right)^n \\]`,

() => `\\[ a_n = \\left(1-\\frac{${rand(1,5)}}{n}\\right)^n \\]`

];

// กันซ้ำ
function key(s){
    return s.replace(/\s/g,'');
}

function next(){

    let q;
    let tries = 0;

    do {
        const g = gens[Math.floor(Math.random()*gens.length)];
        q = g();
        tries++;
    } while(used.has(key(q)) && tries < 50);

    used.add(key(q));

    count++;
    document.getElementById("count").innerText = count;

    const box = document.getElementById("question");

    box.style.opacity = 0;

    setTimeout(() => {
        box.innerHTML = q;
        MathJax.typesetPromise();
        box.style.opacity = 1;
    }, 120);
}

function resetAll(){
    count = 0;
    used.clear();
    document.getElementById("count").innerText = 0;
    document.getElementById("question").innerHTML = "";
}

next();

</script>

</body>
</html>
