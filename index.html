    const name = document.getElementById("name").value.trim();

    }

    examStarted = true;

    document.getElementById("studentName").innerText = name;
    document.getElementById("studentNumber").innerText = number;

    document.getElementById("loginPage").style.display="none";
    document.getElementById("examPage").style.display="block";
}

document.addEventListener("visibilitychange", function(){
    if(examStarted && document.hidden){
        terminateExam("Tab switching detected.");
    }
});

window.onblur = function(){
    if(examStarted){
        terminateExam("Window switching detected.");
    }
};

document.addEventListener("keydown", function(e){
    if(!examStarted) return;

    if(e.key==="F5" || (e.ctrlKey && e.key.toLowerCase()==="r")){
        e.preventDefault();
        terminateExam("Refresh detected.");
    }
});

window.addEventListener("beforeunload", function(e){
    if(examStarted){
        e.preventDefault();
        e.returnValue="";
    }
});

history.pushState(null,null,location.href);
window.onpopstate = function(){

function generateQuestion(){
    if(count >= 5) return;

    let question;
    let allQuestions = [...convergentBank, ...divergentBank];

    // ถ้าเหลือ 1 ข้อสุดท้าย ตรวจว่าขาดประเภทไหน
    if(count === 4){
        let hasConvergent = usedQuestions.some(q => convergentBank.includes(q));
        let hasDivergent = usedQuestions.some(q => divergentBank.includes(q));

        if(!hasConvergent){
            do{
                question = convergentBank[Math.floor(Math.random()*convergentBank.length)];
            } while(usedQuestions.includes(question));
        }
        else if(!hasDivergent){
            do{
                question = divergentBank[Math.floor(Math.random()*divergentBank.length)];
            } while(usedQuestions.includes(question));
        }
    }

    // ถ้ายังไม่ได้ question ให้สุ่มอิสระ
    if(!question){
        do{
            question = allQuestions[Math.floor(Math.random()*allQuestions.length)];
        } while(usedQuestions.includes(question));
    }

    usedQuestions.push(question);
    count++;

    document.getElementById("count").innerText = count;
    document.getElementById("questionBox").innerHTML =
        `Determine whether the following sequence converges or diverges.<br><br>${question}`;

    if(window.MathJax){
        MathJax.typesetPromise();
    }

    if(count >= 5){
        document.getElementById("randomBtn").disabled = true;
    }
}
